<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Details | Luxury Automotive</title>
    <link rel="stylesheet" href="css/car-details.css" />
  </head>
  <body>
    <header>
      <h1>Luxury Automotive | Avant-Garde Supercars</h1>
    </header>
    <main>
      <h2 id="car-name">Loading...</h2>
      <img id="car-image" src="" alt="Supercar" style="max-width: 500px" />

      <div class="specs">
        <p><strong>Horsepower:</strong> <span id="car-hp"></span></p>
        <p><strong>Engine:</strong> <span id="car-engine"></span></p>
      </div>

      <button onclick="window.history.back()">Back</button>
    </main>

    <script src="js/details.js"></script>
  </body>
</html>
