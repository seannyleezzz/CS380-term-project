<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Calculator | Sean's Elite Motors</title>
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/finance-calculator.css" />
  </head>
  <body>
    <header>
      <h1>Luxury Automotive | Avant-Garde Supercars</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="inventory.html">Inventory</a>
        <a href="test-drive-booking.html">Book Test Drive</a>
        <a href="about-us.html">About Us</a>
        <a href="contact.html">Contact</a>
        <a href="finance-calculator.html">Financing</a>
        <a href="reviews.html">Reviews</a>
      </nav>
    </header>

    <main class="calc-wrapper">
      <h2>Supercar Financing Calculator</h2>
      <p>Estimate your monthly payments for your next supercar</p>
      <div class="calc-container">
        <div class="input-box">
          <label>Select Vehicle</label>
          <select id="car-select">
            <option value="">Choose a supercar...</option>
          </select>
        </div>

        <div class="input-box">
          <label>Vehicle Price ($)</label>
          <input
            type="text"
            id="vehicle-price"
            readonly
            placeholder="Select a car first"
          />
        </div>

        <div class="input-box">
          <label>Down Payment ($)</label>
          <input type="number" id="down-payment" placeholder="Enter amount" />
        </div>

        <div class="input-box">
          <label>Interest Rate (%)</label>
          <input type="text" value="8%" readonly />
        </div>

        <div class="result-box">
          <label>Estimated Monthly Payment (60 Months)</label>
          <div id="monthly-payment">$0.00</div>
          <p
            id="error-message"
            style="color: #ff4d4d; font-size: 0.8rem; margin-top: 10px"
          ></p>
        </div>
      </div>
    </main>

    <footer>
      <p>&copy; 2026 Luxury Automotive. All rights reserved.</p>
    </footer>

    <script src="js/car-details.js"></script>
    <script src="js/finance-calculator.js"></script>
  </body>
</html>
