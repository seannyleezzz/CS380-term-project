<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Calculator | Sean's Elite Motors</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>Luxury Automotive | Avant-Garde Supercars</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="inventory.html">Inventory</a>
        <a href="test-drive-booking.html">Book Test Drive</a>
        <a href="about-us.html">About Us</a>
        <a href="contact.html">Contact</a>
        <a href="finance-calculator.html">Financing</a>
        <a href="reviews.html">Reviews</a>
      </nav>
    </header>

    <main>
      <h2>Supercar Financing Calculator</h2>
      <p>Estimate your monthly payments for your next acquisition.</p>

      <section class="calculator-box">
        <div class="input-group">
          <label for="carPrice">Vehicle Price ($):</label>
          <input type="number" id="carPrice" value="250000" step="1000" />
        </div>

        <div class="input-group">
          <label for="downPayment">Down Payment ($):</label>
          <input type="number" id="downPayment" value="50000" step="1000" />
        </div>

        <div class="input-group">
          <label for="interestRate">Interest Rate (%):</label>
          <input type="number" id="interestRate" value="4.5" step="0.1" />
        </div>

        <div class="input-group">
          <label for="loanTerm">Loan Term (Months):</label>
          <select id="loanTerm">
            <option value="36">36 Months (3 Years)</option>
            <option value="48">48 Months (4 Years)</option>
            <option value="60" selected>60 Months (5 Years)</option>
            <option value="72">72 Months (6 Years)</option>
          </select>
        </div>

        <button id="calcBtn">Calculate Payment</button>

        <div class="result-display">
          <h3>Estimated Monthly Payment:</h3>
          <p id="monthlyResult">$0.00</p>
        </div>
      </section>
    </main>

    <script src="js/finance.js"></script>
  </body>
</html>
