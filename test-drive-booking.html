<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Drive Booking | Sean's Elite Motors</title>
    <link rel="stylesheet" href="css/test-drive-booking.css" />
  </head>
  <body>
    <header>
      <h1>Luxury Automotive | Avant-Garde Supercars</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="inventory.html">Inventory</a>
        <a href="test-drive-booking.html">Book Test Drive</a>
        <a href="about-us.html">About Us</a>
        <a href="contact.html">Contact</a>
        <a href="finance-calculator.html">Financing</a>
        <a href="reviews.html">Reviews</a>
      </nav>
    </header>

    <main>
      <div class="book-grid">
        <h2>Book a Test Drive</h2>
        <p>Fill out the form below to request a test drive appointment.</p>

        <form class="book-card">
          <p>
            <label for="name">Full Name:</label><br />
            <input type="text" id="name" name="name" />
          </p>

          <p>
            <label for="email">Email:</label><br />
            <input type="email" id="email" name="email" />
          </p>

          <p>
            <label for="phone">Phone Number:</label><br />
            <input type="tel" id="phone" name="phone" />
          </p>

          <p>
            <label for="vehicle">Vehicle of Interest:</label><br />
            <select id="vehicle" name="vehicle">
              <option>Ferrari 488 Pista</option>
              <option>Lamborghini Huracan EVO</option>
              <option>Porsche 911 Turbo S</option>
              <option>Mercedes-Benz S-Class</option>
            </select>
          </p>

          <p>
            <label for="date">Preferred Date:</label><br />
            <input type="date" id="date" name="date" />
          </p>

          <p>
            <label for="time">Preferred Time Slot:</label><br />
            <select id="time" name="time" required>
              <option value="">Select a time...</option>
              <option value="09:00">9:00 AM</option>
              <option value="10:00">10:00 AM</option>
              <option value="11:00">11:00 AM</option>
              <option value="12:00">12:00 PM</option>
              <option value="13:00">1:00 PM</option>
              <option value="14:00">2:00 PM</option>
              <option value="15:00">3:00 PM</option>
              <option value="16:00">4:00 PM</option>
              <option value="17:00">5:00 PM</option>
            </select>
          </p>

          <p>
            <label for="message">Additional Notes:</label><br />
            <textarea id="message" name="message" rows="5" cols="40"></textarea>
          </p>

          <p>
            <button type="submit">Submit Request</button>
          </p>
        </form>
      </div>
    </main>

    <footer class="footer">
      <p>&copy; 2026 Luxury Automotive. All rights reserved.</p>
    </footer>

    <script src="js/test-drive-booking.js"></script>
  </body>
</html>
